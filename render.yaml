services:
  - type: web
    name: finagent-pro-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: GLM_API_KEY
        sync: false
      - key: GLM_BASE_URL
        value: "https://api.edgefn.net/v1"
      - key: GLM_MODEL
        value: "GLM-5.1"
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: "https://api.deepseek.com"
      - key: DEEPSEEK_MODEL
        value: "deepseek-v4-pro"
      - key: SENSENOVA_API_KEY
        sync: false
      - key: SENSENOVA_BASE_URL
        value: "https://token.sensenova.cn/v1"
      - key: SENSENOVA_MODEL
        value: "sensenova-6.7-flash-lite"
      - key: ENVIRONMENT
        value: "production"
    healthCheckPath: /health
    plan: free
