services:
  - type: web
    name: finagent-pro-backend
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GLM_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SENSENOVA_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./finagent.db
      - key: REDIS_URL
        sync: false
